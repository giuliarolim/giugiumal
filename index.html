<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Objetivos de Vida</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="stars-container" id="stars"></div>
    <div class="hearts-container" id="hearts"></div>

    <main class="container">
        <h1>Meus Sonhos & Metas</h1>
        
        <div class="goals-grid">
            <div class="card" id="goal1">
                <div class="icon">🎓</div>
                <h2>Me Formar</h2>
                <div class="countdown" id="timer1">00:00:00:00</div>
                <p>Falta pouco para o diploma!</p>
            </div>

            <div class="card" id="goal2">
                <div class="icon">🏠</div>
                <h2>Ter uma Família</h2>
                <div class="countdown" id="timer2">00:00:00:00</div>
                <p>Construindo um futuro de amor.</p>
            </div>

            <div class="card" id="goal3">
                <div class="icon">💰</div>
                <h2>Ser Rica</h2>
                <div class="countdown" id="timer3">00:00:00:00</div>
                <p>A prosperidade bate à porta!</p>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
